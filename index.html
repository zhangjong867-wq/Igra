<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-игры на двоих</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Unbounded', sans-serif;
            background: #020617;
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* --- DICE 3D --- */
        .dice-box { perspective: 1000px; width: 80px; height: 80px; }
        .dice {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1.1);
        }
        .dice-side {
            position: absolute; width: 80px; height: 80px;
            background: #fff; border: 1px solid #cbd5e1; border-radius: 12px;
            display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); padding: 10px;
        }
        .dot { background: #1e293b; border-radius: 50%; width: 14px; height: 14px; align-self: center; justify-self: center; }

        .front  { transform: rotateY(0deg) translateZ(40px); }
        .back   { transform: rotateY(180deg) translateZ(40px); }
        .right  { transform: rotateY(90deg) translateZ(40px); }
        .left   { transform: rotateY(-90deg) translateZ(40px); }
        .top    { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }

        .winner-text { animation: pulse 0.8s infinite; color: #fbbf24; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px #fbbf24; }
            50% { transform: scale(1.1); text-shadow: 0 0 25px #fbbf24; }
        }

        .btn-active { background: #2563eb !important; }
    </style>
</head>
<body>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="view-menu" class="flex flex-col items-center justify-center min-h-screen p-6">
        <h1 class="text-4xl md:text-6xl font-black mb-12 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 uppercase text-center">ИГРЫ НА ДВОИХ</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
            <button onclick="changeView('ttt')" class="glass p-8 hover:scale-105 transition-transform group">
                <div class="text-5xl mb-4 group-hover:scale-110 transition">❌</div>
                <div class="text-xs font-bold tracking-widest uppercase text-slate-400">Крестики</div>
            </button>
            <button onclick="changeView('race')" class="glass p-8 hover:scale-105 transition-transform group">
                <div class="text-5xl mb-4 group-hover:scale-110 transition">⚡</div>
                <div class="text-xs font-bold tracking-widest uppercase text-slate-400">Гонка</div>
            </button>
            <button onclick="changeView('dice')" class="glass p-8 hover:scale-105 transition-transform group">
                <div class="text-5xl mb-4 group-hover:rotate-45 transition">🎲</div>
                <div class="text-xs font-bold tracking-widest uppercase text-slate-400">Кости 3.0</div>
            </button>
        </div>
        <p class="mt-12 text-[10px] text-slate-600 uppercase tracking-widest">v2.1 Stable Edition</p>
    </div>

    <!-- ИГРОВОЙ КОНТЕЙНЕР -->
    <div id="view-game" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <button onclick="changeView('menu')" class="absolute top-8 left-8 text-slate-500 font-bold hover:text-white uppercase text-[10px] tracking-widest transition">← В меню</button>

        <!-- ИГРА 1: КРЕСТИКИ -->
        <div id="game-ttt" class="hidden glass p-8 w-full max-w-sm">
            <div class="flex gap-2 mb-6">
                <button id="btn-pvp" onclick="setTTTMode('pvp')" class="flex-1 text-[10px] font-bold p-3 rounded-xl bg-slate-800 transition">Вдвоем</button>
                <button id="btn-pve" onclick="setTTTMode('pve')" class="flex-1 text-[10px] font-bold p-3 rounded-xl bg-slate-800 transition">Робот</button>
            </div>
            <div id="ttt-status" class="text-center mb-4 text-blue-400 text-xs font-bold uppercase tracking-tighter">Ход X</div>
            <div class="grid grid-cols-3 gap-3 bg-white/5 p-3 rounded-2xl" id="ttt-grid">
                <script>
                    for(let i=0; i<9; i++) document.write(`<div onclick="clickTTT(${i})" id="cell-${i}" class="bg-slate-900 aspect-square rounded-xl flex items-center justify-center text-4xl font-black cursor-pointer hover:bg-slate-800 transition"></div>`);
                </script>
            </div>
        </div>

        <!-- ИГРА 2: ГОНКА -->
        <div id="game-race" class="hidden glass p-10 w-full max-w-lg text-center">
            <h3 class="mb-10 text-xs font-bold uppercase tracking-[0.3em] text-slate-500">Кто быстрее?</h3>
            <div class="h-8 bg-slate-900 rounded-full mb-12 p-1.5 border border-white/10 shadow-inner">
                <div id="race-progress" class="h-full w-1/2 bg-gradient-to-r from-blue-500 to-pink-500 rounded-full transition-all duration-75"></div>
            </div>
            <div class="flex gap-4">
                <button onmousedown="handleRace(1)" class="flex-1 h-36 bg-blue-600 rounded-3xl text-5xl font-black shadow-lg shadow-blue-500/20 active:scale-95 transition">A</button>
                <button onmousedown="handleRace(2)" class="flex-1 h-36 bg-pink-600 rounded-3xl text-5xl font-black shadow-lg shadow-pink-500/20 active:scale-95 transition">L</button>
            </div>
            <p class="mt-8 text-[10px] text-slate-600 uppercase">Клавиши A и L на клавиатуре</p>
        </div>

        <!-- ИГРА 3: КОСТИ -->
        <div id="game-dice" class="hidden w-full max-w-4xl flex flex-col md:flex-row gap-6">
            <div class="glass flex-1 p-8 flex flex-col items-center">
                <div class="flex justify-around items-center w-full mb-12 gap-8">
                    <div class="dice-box"><div id="d1" class="dice">
                        <div class="dice-side front"><div class="dot" style="grid-area:2/2"></div></div>
                        <div class="dice-side back"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:2/2"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side right"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side left"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side top"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:2/2"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side bottom"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/2"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/2"></div><div class="dot" style="grid-area:3/3"></div></div>
                    </div></div>
                    <div class="dice-box"><div id="d2" class="dice">
                        <div class="dice-side front"><div class="dot" style="grid-area:2/2"></div></div>
                        <div class="dice-side back"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:2/2"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side right"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side left"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side top"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:2/2"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/3"></div></div>
                        <div class="dice-side bottom"><div class="dot" style="grid-area:1/1"></div><div class="dot" style="grid-area:1/2"></div><div class="dot" style="grid-area:1/3"></div><div class="dot" style="grid-area:3/1"></div><div class="dot" style="grid-area:3/2"></div><div class="dot" style="grid-area:3/3"></div></div>
                    </div></div>
                </div>
                <button onclick="rollDice()" id="btn-roll" class="w-full py-5 bg-gradient-to-r from-yellow-500 to-orange-500 text-black font-black uppercase tracking-widest rounded-2xl shadow-xl hover:brightness-110 active:scale-95 transition">Бросить кубики</button>
            </div>
            <div class="glass w-full md:w-64 p-6 overflow-hidden flex flex-col h-[400px]">
                <h4 class="text-[10px] font-bold uppercase mb-4 text-slate-500 tracking-widest">История</h4>
                <div id="dice-hist" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
            </div>
        </div>
    </div>

    <!-- ПОБЕДА -->
    <div id="modal-win" class="modal">
        <div class="glass p-10 text-center max-w-sm w-full mx-4 border-yellow-500">
            <div class="text-6xl mb-6">🏆</div>
            <h2 class="text-3xl font-black winner-text mb-2 uppercase">МОЛОДЕЦ!</h2>
            <p id="win-label" class="text-[10px] text-slate-400 uppercase tracking-widest mb-8"></p>
            <button onclick="closeWin()" class="w-full py-4 bg-yellow-500 text-black font-bold rounded-xl uppercase hover:bg-yellow-400 transition">Заново</button>
        </div>
    </div>

    <script>
        // --- ПЕРЕМЕННЫЕ СОСТОЯНИЯ ---
        let currentView = 'menu';
        let activeGame = '';
        
        // --- НАВИГАЦИЯ ---
        function changeView(view) {
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-game').classList.add('hidden');
            document.getElementById('game-ttt').classList.add('hidden');
            document.getElementById('game-race').classList.add('hidden');
            document.getElementById('game-dice').classList.add('hidden');

            if(view === 'menu') {
                document.getElementById('view-menu').classList.remove('hidden');
                activeGame = '';
            } else {
                document.getElementById('view-game').classList.remove('hidden');
                document.getElementById('game-' + view).classList.remove('hidden');
                activeGame = view;
                initGame(view);
            }
        }

        function initGame(game) {
            if(game === 'ttt') resetTTT();
            if(game === 'race') resetRace();
            if(game === 'dice') resetDice();
        }

        function showWin(msg) {
            document.getElementById('win-label').innerText = msg;
            document.getElementById('modal-win').classList.add('active');
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance("Молодец! " + msg);
            utter.lang = 'ru-RU';
            synth.speak(utter);
        }

        function closeWin() {
            document.getElementById('modal-win').classList.remove('active');
            initGame(activeGame);
        }

        // --- ЛОГИКА: КРЕСТИКИ ---
        let tttData = Array(9).fill(null), tttTurn = 'X', tttMode = 'pvp', tttLive = true;
        
        function setTTTMode(m) {
            tttMode = m;
            document.getElementById('btn-pvp').classList.toggle('btn-active', m === 'pvp');
            document.getElementById('btn-pve').classList.toggle('btn-active', m === 'pve');
            resetTTT();
        }

        function clickTTT(i) {
            if(!tttLive || tttData[i]) return;
            tttData[i] = tttTurn;
            const el = document.getElementById('cell-' + i);
            el.innerText = tttTurn;
            el.style.color = tttTurn === 'X' ? '#60a5fa' : '#f472b6';
            
            if(checkTTT()) {
                tttLive = false;
                showWin("Победил " + tttTurn);
                return;
            }
            if(!tttData.includes(null)) {
                tttLive = false;
                showWin("Ничья!");
                return;
            }

            tttTurn = tttTurn === 'X' ? 'O' : 'X';
            document.getElementById('ttt-status').innerText = "Ход " + tttTurn;
            document.getElementById('ttt-status').style.color = tttTurn === 'X' ? '#60a5fa' : '#f472b6';

            if(tttMode === 'pve' && tttTurn === 'O') setTimeout(aiTTT, 400);
        }

        function aiTTT() {
            let free = tttData.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if(free.length) clickTTT(free[Math.floor(Math.random() * free.length)]);
        }

        function checkTTT() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(l => tttData[l[0]] && tttData[l[0]] === tttData[l[1]] && tttData[l[0]] === tttData[l[2]]);
        }

        function resetTTT() {
            tttData.fill(null); tttTurn = 'X'; tttLive = true;
            for(let i=0; i<9; i++) document.getElementById('cell-'+i).innerText = '';
            document.getElementById('ttt-status').innerText = "Ход X";
            document.getElementById('ttt-status').style.color = '#60a5fa';
            setTTTMode(tttMode); 
        }

        // --- ЛОГИКА: ГОНКА ---
        let raceVal = 50;
        function handleRace(p) {
            if(activeGame !== 'race') return;
            raceVal += (p === 1 ? 4 : -4);
            document.getElementById('race-progress').style.width = raceVal + '%';
            if(raceVal >= 100) showWin("Синий победил!");
            if(raceVal <= 0) showWin("Розовый победил!");
        }

        function resetRace() {
            raceVal = 50;
            document.getElementById('race-progress').style.width = '50%';
        }

        window.onkeydown = (e) => {
            if(activeGame === 'race') {
                if(e.code === 'KeyA') handleRace(1);
                if(e.code === 'KeyL') handleRace(2);
            }
        };

        // --- ЛОГИКА: КОСТИ ---
        function rollDice() {
            const btn = document.getElementById('btn-roll');
            btn.disabled = true;
            const r1 = Math.floor(Math.random()*6)+1;
            const r2 = Math.floor(Math.random()*6)+1;
            
            const rots = {1:[0,0], 2:[0,180], 3:[0,90], 4:[0,-90], 5:[-90,0], 6:[90,0]};
            const rand = () => (Math.floor(Math.random()*3)+3)*360;

            document.getElementById('d1').style.transform = `rotateX(${rand() + rots[r1][0]}deg) rotateY(${rand() + rots[r1][1]}deg)`;
            document.getElementById('d2').style.transform = `rotateX(${rand() + rots[r2][0]}deg) rotateY(${rand() + rots[r2][1]}deg)`;

            setTimeout(() => {
                const item = document.createElement('div');
                item.className = "p-2 bg-white/5 rounded text-[10px] flex justify-between border-l-4 " + (r1 > r2 ? 'border-blue-500' : 'border-pink-500');
                item.innerHTML = `<span>Бой ${document.getElementById('dice-hist').children.length+1}</span> <b>${r1}:${r2}</b>`;
                document.getElementById('dice-hist').prepend(item);
                
                showWin(r1 > r2 ? "Игрок 1" : (r2 > r1 ? "Игрок 2" : "Ничья"));
                btn.disabled = false;
            }, 1600);
        }

        function resetDice() {
            document.getElementById('d1').style.transform = 'rotateX(0deg) rotateY(0deg)';
            document.getElementById('d2').style.transform = 'rotateX(0deg) rotateY(0deg)';
        }

        // Старт в меню
        changeView('menu');
    </script>
</body>
</html>
